<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Generator | AI Super App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern_styles.css') }}">
    <style>
        .dashboard-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .control-panel {
            padding: 3rem;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .input-group label {
            font-weight: 600;
            color: var(--text-main);
            margin-left: 0.5rem;
        }
        .modern-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-glass);
            padding: 1.25rem;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .modern-input:focus {
            outline: none;
            border-color: var(--accent-violet);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }
        #output {
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }
        #output img {
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 100%;
            border: 1px solid var(--border-glass);
        }
        .action-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .profile-chip {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            background: var(--border-glass);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="blob"></div>
    
    <nav class="nav-container">
        <div class="nav-logo glow-text">AI Image Gen</div>
        <div class="nav-menu">
            <div class="profile-chip">
                <i class="fas fa-coins text-yellow-400"></i>
                <span>{{ user.credits }} Credits</span>
            </div>
            <a href="/gallery" class="nav-link">Gallery</a>
            <a href="/home" class="nav-link">Home</a>
            <a href="/logout" class="btn-premium btn-outline" style="padding: 0.5rem 1rem;">Logout</a>
        </div>
    </nav>

    <main class="dashboard-container">
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="glow-text" style="font-size: 3rem; font-weight: 800; margin-bottom: 1rem;">Create Visual Magic</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Transform your thoughts into stunning high-fidelity images.</p>
        </header>

        <div class="control-panel glass animate-fade-in" style="animation-delay: 0.1s;">
            <div class="input-group">
                <label>Prompt</label>
                <textarea id="prompt" class="modern-input" rows="3" placeholder="Describe the image you want to create..."></textarea>
            </div>

            <div class="input-group">
                <label>Face LoRA (Optional)</label>
                <div style="display: flex; gap: 1rem;">
                    <input type="text" id="hf_lora" class="modern-input" style="flex: 1;" placeholder="Enter HuggingFace LoRA model path...">
                    <button class="btn-premium btn-outline" onclick="window.open('https://forms.gle/fLapBTz7VM8jhnAV8', '_blank')">Train Face</button>
                </div>
            </div>

            <button id="generateBtn" class="btn-premium btn-primary" style="justify-content: center; padding: 1.25rem;">
                <i class="fas fa-sparkles"></i> Generate Masterpiece
            </button>

            <div id="loading" style="display: none; text-align: center;">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--accent-violet);"></i>
                <p style="margin-top: 1rem; color: var(--text-muted);">Summoning pixels...</p>
            </div>

            <div id="output"></div>
        </div>
    </main>

    <script>
        document.getElementById('generateBtn').onclick = async function() {
            const prompt = document.getElementById('prompt').value;
            const hf_lora = document.getElementById('hf_lora').value;
            const generateBtn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const output = document.getElementById('output');

            if (!prompt.trim()) {
                alert('Please enter a prompt.');
                return;
            }

            const userCredits = {{ user.credits }};
            if (userCredits <= 0) {
                alert('0 credits left. Please buy premium to generate more images.');
                window.location.href = 'pricing';
                return;
            }

            generateBtn.style.display = 'none';
            loading.style.display = 'block';
            output.innerHTML = '';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, hf_lora })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    const img = document.createElement('img');
                    img.src = data.image_url + '?t=' + new Date().getTime();
                    output.appendChild(img);

                    const actionBar = document.createElement('div');
                    actionBar.className = 'action-bar animate-fade-in';

                    const saveBtn = document.createElement('button');
                    saveBtn.className = 'btn-premium btn-primary';
                    saveBtn.innerHTML = '<i class="fas fa-save"></i> Save to Cloud';
                    saveBtn.onclick = async () => {
                        const saveResponse = await fetch('/save_image', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: '{{ user.email }}', image_url: img.src })
                        });
                        const saveData = await saveResponse.json();
                        if (saveData.status === 'success') alert('Saved successfully!');
                        else alert('Gallery full! Upgrade for more slots.');
                    };

                    const downloadBtn = document.createElement('a');
                    downloadBtn.href = img.src;
                    downloadBtn.download = 'ai-generation.png';
                    downloadBtn.className = 'btn-premium btn-outline';
                    downloadBtn.innerHTML = '<i class="fas fa-download"></i> Download';

                    actionBar.appendChild(saveBtn);
                    actionBar.appendChild(downloadBtn);
                    output.appendChild(actionBar);
                } else {
                    output.innerHTML = '<p style="color: #ef4444;">Failed to generate image. Please try again.</p>';
                }
            } catch (err) {
                console.error(err);
                output.innerHTML = '<p style="color: #ef4444;">An error occurred.</p>';
            } finally {
                generateBtn.style.display = 'flex';
                loading.style.display = 'none';
            }
        };
    </script>
    <footer class="footer">
        <p>&copy; 2026 AI Super App Studio.</p>
    </footer>
</body>
</html>
