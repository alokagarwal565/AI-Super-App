<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Studio | AI Super App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern_styles.css') }}">
    <style>
        .studio-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }
        .controls-sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: fit-content;
            padding: 2rem;
            position: sticky;
            top: 100px;
        }
        .preview-area {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .control-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .modern-select, .modern-textarea {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-glass);
            padding: 0.75rem;
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            width: 100%;
        }
        .file-upload-card {
            border: 1px dashed var(--border-glass);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-upload-card:hover {
            border-color: var(--accent-violet);
            background: rgba(139, 92, 246, 0.05);
        }
        .file-upload-card i {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--accent-violet);
        }
        .file-preview {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            display: none;
            margin-top: 0.5rem;
        }
        #video-display {
            width: 100%;
            aspect-ratio: 16/9;
            background: black;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #video-display video {
            width: 100%;
            height: 100%;
        }
        .loading-overlay {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
            background: var(--accent-violet);
            color: white;
        }
    </style>
</head>
<body>
    <div class="blob" style="background: var(--accent-blue); bottom: -10%; right: -10%;"></div>
    
    <nav class="nav-container">
        <div class="nav-logo">
            <span class="glow-text">AI Video Studio</span>
            <span class="status-badge" style="margin-left: 10px;">VEO 3.1</span>
        </div>
        <div class="nav-menu">
            <div class="profile-chip glass">
                <i class="fas fa-coins text-yellow-400"></i>
                <span>{{ user.credits }} Credits</span>
            </div>
            <a href="/home" class="nav-link">Home</a>
            <a href="/logout" class="btn-premium btn-outline" style="padding: 0.5rem 1rem;">Logout</a>
        </div>
    </nav>

    <main class="studio-container">
        <!-- Controls Sidebar -->
        <aside class="controls-sidebar glass animate-fade-in">
            <div class="control-group">
                <label>
                    Aspect Ratio 
                    <span data-tooltip="Controls the frame orientation. 16:9 for YouTube, 9:16 for Reels/Shorts.">
                        <i class="fas fa-info-circle" style="font-size: 0.7rem; cursor: help; opacity: 0.6;"></i>
                    </span>
                </label>
                <select id="aspect_ratio" class="modern-select">
                    <option value="16:9">16:9 Landscape</option>
                    <option value="9:16">9:16 Portrait</option>
                </select>
            </div>

            <div class="control-group">
                <label>
                    Resolution
                    <span data-tooltip="Higher resolutions offer more detail but may take longer to synthesize.">
                        <i class="fas fa-info-circle" style="font-size: 0.7rem; cursor: help; opacity: 0.6;"></i>
                    </span>
                </label>
                <select id="resolution" class="modern-select">
                    <option value="720p">720p HD</option>
                    <option value="1080p">1080p Full HD</option>
                    <option value="4k">4K Ultra HD</option>
                </select>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border-glass); margin: 0.5rem 0;">

            <div class="control-group">
                <label>
                    Reference Image
                    <span data-tooltip="Upload an image to maintain character or object consistency across the video.">
                        <i class="fas fa-info-circle" style="font-size: 0.7rem; cursor: help; opacity: 0.6;"></i>
                    </span>
                </label>
                <div class="file-upload-card" onclick="document.getElementById('ref_image').click()">
                    <i class="fas fa-id-card"></i>
                    <p style="font-size: 0.75rem;">Upload Asset Ref</p>
                    <input type="file" id="ref_image" hidden accept="image/*" onchange="previewFile(this, 'ref_preview')">
                    <img id="ref_preview" class="file-preview">
                </div>
            </div>

            <div class="control-group">
                <label>
                    Keyframes (Interpolation)
                    <span data-tooltip="Provide starting and ending images; the AI will generate the motion between them.">
                        <i class="fas fa-info-circle" style="font-size: 0.7rem; cursor: help; opacity: 0.6;"></i>
                    </span>
                </label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                    <div class="file-upload-card" onclick="document.getElementById('first_frame').click()">
                        <p style="font-size: 0.7rem;">First Frame</p>
                        <input type="file" id="first_frame" hidden accept="image/*" onchange="previewFile(this, 'first_preview')">
                        <img id="first_preview" class="file-preview">
                    </div>
                    <div class="file-upload-card" onclick="document.getElementById('last_frame').click()">
                        <p style="font-size: 0.7rem;">Last Frame</p>
                        <input type="file" id="last_frame" hidden accept="image/*" onchange="previewFile(this, 'last_preview')">
                        <img id="last_preview" class="file-preview">
                    </div>
                </div>
            </div>

            <button id="generateBtn" class="btn-premium btn-primary" style="justify-content: center; margin-top: 1rem;">
                <i class="fas fa-film"></i> Generate Video
            </button>
        </aside>

        <!-- Preview Area -->
        <section class="preview-area animate-fade-in" style="animation-delay: 0.1s;">
            <div class="control-group">
                <label>Cinematic Prompt</label>
                <textarea id="prompt" class="modern-textarea" rows="4" placeholder="Describe your cinematic masterpiece... (e.g., A slow panning shot of a dragon breathing blue fire in a snow-covered valley)"></textarea>
            </div>

            <div id="video-display">
                <div id="placeholder-text" style="color: var(--text-muted); text-align: center;">
                    <i class="fas fa-clapperboard" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.2;"></i>
                    <p>Your video will appear here</p>
                </div>
                
                <div class="loading-overlay" id="loading">
                    <i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; color: var(--accent-violet);"></i>
                    <p id="loading-status" style="font-weight: 500;">Synthesizing temporal frames...</p>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">This usually takes 60-90 seconds</p>
                </div>

                <video id="generated-video" controls style="display: none;"></video>
            </div>

            <div id="action-bar" style="display: none; justify-content: center; gap: 1rem;">
                <a id="download-link" href="#" download="ai-masterpiece.mp4" class="btn-premium btn-primary">
                    <i class="fas fa-download"></i> Download Video
                </a>
                <button class="btn-premium btn-outline" onclick="location.reload()">
                    <i class="fas fa-redo"></i> Create New
                </button>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 AI Super App Studio | Powered by Gemini Veo 3.1</p>
    </footer>

    <script>
        function previewFile(input, previewId) {
            const file = input.files[0];
            const preview = document.getElementById(previewId);
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }

        async function fileToBase64(file) {
            if (!file) return null;
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        document.getElementById('generateBtn').onclick = async function() {
            const prompt = document.getElementById('prompt').value;
            const aspectRatio = document.getElementById('aspect_ratio').value;
            const resolution = document.getElementById('resolution').value;
            
            const refFile = document.getElementById('ref_image').files[0];
            const firstFile = document.getElementById('first_frame').files[0];
            const lastFile = document.getElementById('last_frame').files[0];

            if (!prompt.trim()) {
                alert('Please enter a prompt.');
                return;
            }

            const generateBtn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const placeholder = document.getElementById('placeholder-text');
            const videoElement = document.getElementById('generated-video');
            const actionBar = document.getElementById('action-bar');
            const loadingStatus = document.getElementById('loading-status');

            generateBtn.disabled = true;
            generateBtn.style.opacity = '0.5';
            placeholder.style.display = 'none';
            videoElement.style.display = 'none';
            actionBar.style.display = 'none';
            loading.style.display = 'flex';

            try {
                // Prepare form data for images
                const payload = {
                    prompt,
                    aspect_ratio: aspectRatio,
                    resolution,
                    ref_image: await fileToBase64(refFile),
                    first_frame: await fileToBase64(firstFile),
                    last_frame: await fileToBase64(lastFile)
                };

                loadingStatus.innerText = "Initiating generation...";
                const response = await fetch('/generate_video', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.status === 'success') {
                    // Start polling for the video
                    const operationId = data.operation_id;
                    pollStatus(operationId);
                } else {
                    alert('Error: ' + data.message);
                    resetUI();
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred during generation.');
                resetUI();
            }
        };

        async function pollStatus(operationId) {
            const loadingStatus = document.getElementById('loading-status');
            let attempts = 0;
            const maxAttempts = 30; // 5 minutes approx

            const check = async () => {
                attempts++;
                loadingStatus.innerText = `Generating frames... (${attempts * 10}s)`;
                
                try {
                    const response = await fetch(`/video_status/${operationId}`);
                    const data = await response.json();

                    if (data.status === 'done') {
                        showVideo(data.video_url);
                    } else if (data.status === 'failed') {
                        alert('Generation failed: ' + data.message);
                        resetUI();
                    } else if (attempts < maxAttempts) {
                        setTimeout(check, 10000); // Check every 10s
                    } else {
                        alert('Generation timed out. Please try again.');
                        resetUI();
                    }
                } catch (err) {
                    console.error(err);
                    setTimeout(check, 10000);
                }
            };

            check();
        }

        function showVideo(url) {
            const videoElement = document.getElementById('generated-video');
            const loading = document.getElementById('loading');
            const actionBar = document.getElementById('action-bar');
            const downloadLink = document.getElementById('download-link');

            loading.style.display = 'none';
            videoElement.src = url;
            videoElement.style.display = 'block';
            actionBar.style.display = 'flex';
            downloadLink.href = url;
            
            document.getElementById('generateBtn').disabled = false;
            document.getElementById('generateBtn').style.opacity = '1';
        }

        function resetUI() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('placeholder-text').style.display = 'block';
            document.getElementById('generateBtn').disabled = false;
            document.getElementById('generateBtn').style.opacity = '1';
        }
    </script>
</body>
</html>
