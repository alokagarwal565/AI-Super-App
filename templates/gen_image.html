<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagen 3 Studio | AI Super App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern_styles.css') }}">
    <style>
        .studio-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 2rem;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            height: calc(100vh - 100px);
        }

        .sidebar {
            background: var(--bg-glass);
            border-radius: 32px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            overflow-y: auto;
            border: 1px solid var(--border-glass);
        }

        .main-canvas {
            background: rgba(15, 23, 42, 0.3);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px dashed var(--border-glass);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .modern-select, .modern-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-glass);
            padding: 1rem;
            border-radius: 16px;
            color: white;
            font-size: 0.95rem;
            width: 100%;
        }

        .modern-input:focus {
            outline: none;
            border-color: var(--accent-violet);
        }

        .aspect-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }

        .aspect-option {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-glass);
            padding: 0.75rem;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .aspect-option.active {
            border-color: var(--accent-violet);
            background: rgba(139, 92, 246, 0.2);
            color: var(--accent-violet);
            font-weight: 700;
        }

        .upload-zone {
            border: 2px dashed var(--border-glass);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-zone:hover {
            border-color: var(--accent-violet);
            background: rgba(139, 92, 246, 0.05);
        }

        #imagePreview {
            max-width: 100%;
            max-height: 100%;
            border-radius: 24px;
            display: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.4);
            padding: 0.75rem 1rem;
            border-radius: 12px;
        }

        /* Switch styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-violet); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-generate {
            background: linear-gradient(135deg, var(--accent-violet), var(--accent-blue));
            color: white;
            padding: 1.25rem;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: auto;
            transition: all 0.3s;
        }

        .btn-generate:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(139, 92, 246, 0.4);
        }
    </style>
</head>
<body>
    <div class="blob" style="background: var(--accent-blue); top: -10%; left: -10%;"></div>
    
    <nav class="nav-container">
        <div class="nav-logo glow-text">Imagen 3 Studio</div>
        <div class="nav-menu">
            <div class="profile-chip glass" style="padding: 0.5rem 1rem; border-radius: 9999px;">
                <i class="fas fa-coins" style="color: #fbbf24;"></i>
                <span>{{ user.credits }} Credits</span>
            </div>
            <a href="/dashboard" class="nav-link">Legacy Studio</a>
            <a href="/gallery" class="nav-link">Vault</a>
            <a href="/home" class="nav-link">Home</a>
        </div>
    </nav>

    <main class="studio-layout animate-fade-in">
        <aside class="sidebar">
            <div class="input-group">
                <label><i class="fas fa-microchip"></i> AI Model</label>
                <select id="model" class="modern-select">
                    <option value="gemini-3.1-flash-image-preview">Imagen 3 Flash (Fast)</option>
                    <option value="gemini-3-pro-image-preview" selected>Imagen 3 Pro (High Quality)</option>
                </select>
            </div>

            <div class="input-group">
                <label><i class="fas fa-expand"></i> Aspect Ratio</label>
                <div class="aspect-grid">
                    <div class="aspect-option active" data-ratio="1:1">1:1</div>
                    <div class="aspect-option" data-ratio="4:3">4:3</div>
                    <div class="aspect-option" data-ratio="3:4">3:4</div>
                    <div class="aspect-option" data-ratio="16:9">16:9</div>
                    <div class="aspect-option" data-ratio="9:16">9:16</div>
                </div>
            </div>

            <div class="input-group">
                <label>
                    <i class="fas fa-search"></i> Search Grounding 
                    <i class="fas fa-info-circle" style="font-size: 0.7rem; cursor: help; opacity: 0.6;" title="Uses Google Search to ensure factual accuracy in images (landmarks, current events, etc.)"></i>
                </label>
                <div class="toggle-switch">
                    <span style="font-size: 0.9rem; color: var(--text-muted);">Factual Accuracy</span>
                    <label class="switch">
                        <input type="checkbox" id="searchGrounding">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="input-group">
                <label><i class="fas fa-image"></i> Reference Image (Optional)</label>
                <div class="upload-zone" onclick="document.getElementById('refImage').click()">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; margin-bottom: 0.5rem; color: var(--accent-violet);"></i>
                    <p id="uploadText" style="font-size: 0.8rem; color: var(--text-muted);">Click to upload for Image-to-Image</p>
                    <input type="file" id="refImage" hidden accept="image/*">
                </div>
            </div>

            <div class="input-group">
                <label>
                    <i class="fas fa-shield-alt"></i> Safety Filter
                    <i class="fas fa-info-circle" style="font-size: 0.7rem; cursor: help; opacity: 0.6;" title="Controls the strictness of content moderation. 'Standard' blocks most sensitive content."></i>
                </label>
                <select id="safety" class="modern-select">
                    <option value="BLOCK_LOW_AND_ABOVE">Standard</option>
                    <option value="BLOCK_ONLY_HIGH">Loose</option>
                    <option value="BLOCK_NONE">None</option>
                </select>
            </div>

            <button id="generateBtn" class="btn-generate">
                <i class="fas fa-wand-magic-sparkles"></i> GENERATE
            </button>
        </aside>

        <section class="main-canvas">
            <div id="placeholder" style="text-align: center; color: var(--text-muted);">
                <i class="fas fa-mountain-sun" style="font-size: 5rem; opacity: 0.1; margin-bottom: 2rem;"></i>
                <h2>Ready for your vision</h2>
                <p>Enter a prompt below to begin creating</p>
            </div>

            <img id="imagePreview" alt="Generated Content">

            <div class="loading-overlay" id="loader">
                <div class="spinner"></div>
                <h3 style="margin-top: 2rem;">Generating Image...</h3>
                <p style="color: var(--text-muted);">Imagen 3 is processing your request</p>
            </div>

            <!-- Prompt Bar -->
            <div style="position: absolute; bottom: 30px; left: 30px; right: 30px; display: flex; gap: 1rem; z-index: 5;">
                <textarea id="prompt" class="modern-input" rows="1" placeholder="A futuristic city with floating gardens, cinematic lighting, 8k..." style="resize: none; padding: 1.25rem 2rem; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid var(--accent-violet); box-shadow: 0 10px 40px rgba(0,0,0,0.5);"></textarea>
            </div>

            <!-- Action Bar -->
            <div id="actionBar" style="position: absolute; top: 30px; right: 30px; display: none; gap: 1rem; z-index: 5;">
                <button class="btn-premium btn-primary" id="saveBtn"><i class="fas fa-cloud-upload"></i> Save to Vault</button>
                <button class="btn-premium btn-outline" id="downloadBtn"><i class="fas fa-download"></i> Download</button>
            </div>
        </section>
    </main>

    <script>
        let selectedRatio = "1:1";
        let base64RefImage = null;

        // Handle Aspect Ratio Selection
        document.querySelectorAll('.aspect-option').forEach(opt => {
            opt.onclick = () => {
                document.querySelectorAll('.aspect-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                selectedRatio = opt.dataset.ratio;
            };
        });

        // Handle Image Upload
        document.getElementById('refImage').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    base64RefImage = event.target.result.split(',')[1];
                    document.getElementById('uploadText').innerText = file.name;
                    document.getElementById('uploadText').style.color = 'var(--accent-emerald)';
                };
                reader.readAsDataURL(file);
            }
        };

        // Generation Logic
        document.getElementById('generateBtn').onclick = async function() {
            const prompt = document.getElementById('prompt').value;
            if (!prompt.trim()) return alert("Please enter a prompt!");

            const model = document.getElementById('model').value;
            const searchGrounding = document.getElementById('searchGrounding').checked;
            const safety = document.getElementById('safety').value;

            document.getElementById('loader').style.display = 'flex';
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('actionBar').style.display = 'none';

            try {
                const res = await fetch('/generate_image_gemini', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt, model, ratio: selectedRatio, 
                        grounding: searchGrounding,
                        safety, ref_image: base64RefImage
                    })
                });

                const data = await res.json();
                if (data.status === 'success') {
                    const img = document.getElementById('imagePreview');
                    img.src = 'data:image/png;base64,' + data.image_base64;
                    img.style.display = 'block';
                    document.getElementById('actionBar').style.display = 'flex';
                    
                    // Setup download
                    const downloadBtn = document.getElementById('downloadBtn');
                    downloadBtn.onclick = () => {
                        const link = document.createElement('a');
                        link.href = img.src;
                        link.download = `gemini-gen-${Date.now()}.png`;
                        link.click();
                    };

                    // Setup Save
                    document.getElementById('saveBtn').onclick = async () => {
                        const saveRes = await fetch('/save_image_v2', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ image_base64: data.image_base64 })
                        });
                        const saveData = await saveRes.json();
                        if (saveData.status === 'success') alert("Saved to Vault!");
                        else alert("Gallery Full!");
                    };
                } else {
                    alert("Error: " + data.message);
                }
            } catch (err) {
                console.error(err);
                alert("Generation failed.");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        };

        // Auto-expand textarea
        const tx = document.getElementById('prompt');
        tx.addEventListener("input", OnInput, false);
        function OnInput() {
            this.style.height = "auto";
            this.style.height = (this.scrollHeight) + "px";
        }
    </script>
</body>
</html>
